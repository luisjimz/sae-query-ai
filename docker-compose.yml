services:
  firebird:
    image: jacobalberty/firebird:2.5-ss
    restart: unless-stopped
    environment:
      ISC_PASSWORD: masterkey
    volumes:
      - /root/firebird-data:/firebird/data
    ports:
      - "3050:3050"

  app:
    build: .
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      FB_HOST: firebird
      FB_PORT: "3050"
      FB_DATABASE: /firebird/data/SAE90EMPRE02.FDB
    depends_on:
      - firebird
